<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Anonymization — PII Anonymization System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

#vanta-bg { position:fixed; inset:0; z-index:0; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #050d1a;
  padding: 30px 20px;
}

.card {
  position: relative;
  z-index: 1;
  width: min(680px, 96vw);
  background: rgba(10,20,45,0.78);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(59,130,246,0.3);
  border-radius: 20px;
  padding: 44px 42px;
  box-shadow: 0 0 40px rgba(59,130,246,0.2), 0 20px 60px rgba(0,0,0,0.5);
  animation: fadeUp 0.6s ease both;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(28px); }
  to   { opacity:1; transform:translateY(0); }
}

.card h2 {
  color:#f0f4ff; font-size:1.4rem; font-weight:700;
  margin-bottom:6px; display:flex; align-items:center; gap:10px;
}

.card .sub { color:#64748b; font-size:0.84rem; margin-bottom:26px; }

label {
  display:block; font-size:0.72rem; font-weight:600;
  color:#94a3b8; text-transform:uppercase;
  letter-spacing:0.05em; margin-bottom:6px;
}

textarea {
  width:100%; padding:14px 16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(59,130,246,0.22);
  border-radius:10px; color:#f0f4ff;
  font-size:0.9rem; font-family:inherit;
  line-height:1.6; resize:vertical;
  min-height:200px; outline:none;
  transition:border-color 0.25s, box-shadow 0.25s;
}

textarea:focus {
  border-color:#3b82f6;
  box-shadow:0 0 0 3px rgba(59,130,246,0.15);
  background:rgba(59,130,246,0.06);
}

textarea::placeholder { color:#475569; }

button {
  width:100%; margin-top:18px; padding:13px;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  border:none; border-radius:10px; color:#fff;
  font-size:0.95rem; font-weight:700; cursor:pointer;
  box-shadow:0 4px 18px rgba(59,130,246,0.35);
  transition:opacity 0.2s, transform 0.2s;
}
button:hover { opacity:0.88; transform:translateY(-1px); }

.back {
  display:inline-flex; align-items:center; gap:5px;
  color:#475569; font-size:0.83rem;
  text-decoration:none; margin-top:16px;
  transition:color 0.2s;
}
.back:hover { color:#3b82f6; }
</style>
</head>
<body>

<div id="vanta-bg"></div>

<!-- form action/method/name UNCHANGED -->
<div class="card">
  <h2>✏️ Text Anonymization</h2>
  <p class="sub">Paste any paragraph containing personal data. The system will detect and mask all PII automatically.</p>

  <form action="http://127.0.0.1:5000/anonymize-text" method="POST">
    <label for="text">Input Text</label>
    <textarea id="text" name="text" rows="10"
      placeholder="Enter a paragraph with personal data...&#10;&#10;Example: My name is Usha S P, my email is usha@gmail.com and phone is 9876543210..."
      required></textarea>

    <button type="submit">🔍 Anonymize Text →</button>
  </form>

  <a href="http://127.0.0.1:5000/user-dashboard" class="back">⬅ Back to Dashboard</a>
</div>

<script>
VANTA.NET({
  el: "#vanta-bg",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,
  minHeight: 200.00,
  minWidth: 200.00,
  scale: 1.00,
  scaleMobile: 1.00,
  color: 0x3b82f6,
  backgroundColor: 0x050d1a,
  points: 10.00,
  maxDistance: 22.00,
  spacing: 18.00
});
</script>
</body>
</html>
